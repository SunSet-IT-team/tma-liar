name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration tests (docker compose)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend-test --no-attach mongodb-test
          code=$?
          docker compose -f docker-compose.test.yml down -v
          exit $code

