name: Deploy prod

on:
  push:
    branches:
      - main

concurrency:
  group: prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (docker compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          timeout: 30m
          command_timeout: 60m
          script: |
            set -euo pipefail
            cd "${{ secrets.PROD_PATH }}"
            # If deploy gets interrupted (timeout/kill), free intermediate layers.
            trap 'docker image prune -f || true' EXIT
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            # Limit concurrent builds to reduce load spikes on the server.
            COMPOSE_BAKE=false COMPOSE_PARALLEL_LIMIT=1 docker compose -f docker-compose.prod.yml build --pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f || true
