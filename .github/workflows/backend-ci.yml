name: Backend CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_CONN_STRING: mongodb://127.0.0.1:27017
      DB_NAME: liar_ci
      SECRET: test-secret
      JWT_EXPIRES_IN: 1d
      TELEGRAM_BOT_TOKEN: test-bot-token
      TELEGRAM_INITDATA_EXPIRES_IN: 3600
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      AUTH_RATE_LIMIT_WINDOW_MS: 60000
      AUTH_RATE_LIMIT_MAX: 30
      SCORE_NOT_STATED: 50
      SCORE_TRICKED: 100
      GAME_STAGE_TIMER_MS: 1000
      HIDDEN_DURING_GAME_FIELDS: doLie,questionHistory,liarId,timerId
      GAME_RESULTS_FIELDS: doLie,loserTask,winnerId,loserId
      LOBBY_CODE_ALPHABET: ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789
      LOBBY_CODE_LENGTH: 6
      RUN_INTEGRATION_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Backend typecheck
        run: bun run --cwd apps/backend typecheck

      - name: Backend tests
        run: bun run --cwd apps/backend test
