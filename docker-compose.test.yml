services:
  mongodb-test:
    image: mongo:8.2.3
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all']
    volumes:
      - mongodb_data_test:/data/db
      - mongodb_config_test:/data/configdb
      - ./infra/mongo/init-replica-test.js:/docker-entrypoint-initdb.d/init-replica.js:ro
    healthcheck:
      test: ['CMD-SHELL', 'mongosh --quiet --eval "db.hello().isWritablePrimary" | grep true']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - tma-liar-network-test

  backend-test:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.dev
    working_dir: /app
    environment:
      NODE_ENV: test
      RUN_INTEGRATION_TESTS: '1'
      DB_CONN_STRING: mongodb://mongodb-test:27017/?replicaSet=rs0&directConnection=true
      DB_NAME: liar_test
      SECRET: ${SECRET:-test-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-test-bot-token}
      TELEGRAM_INITDATA_EXPIRES_IN: ${TELEGRAM_INITDATA_EXPIRES_IN:-3600}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-30}
      SCORE_NOT_STATED: ${SCORE_NOT_STATED:-50}
      SCORE_TRICKED: ${SCORE_TRICKED:-100}
      GAME_STAGE_TIMER_MS: ${GAME_STAGE_TIMER_MS:-1000}
      HIDDEN_DURING_GAME_FIELDS: ${HIDDEN_DURING_GAME_FIELDS:-doLie,questionHistory,liarId,timerId}
      GAME_RESULTS_FIELDS: ${GAME_RESULTS_FIELDS:-doLie,loserTask,winnerId,loserId}
      LOBBY_CODE_ALPHABET: ${LOBBY_CODE_ALPHABET:-ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789}
      LOBBY_CODE_LENGTH: ${LOBBY_CODE_LENGTH:-6}
    depends_on:
      mongodb-test:
        condition: service_healthy
    command: ['sh', '-c', 'bun run --cwd apps/backend typecheck && bun run --cwd apps/backend test']
    volumes:
      - ./apps/backend:/app/apps/backend
      - ./apps/common:/app/apps/common
      - ./packages:/app/packages
      - backend_node_modules_test:/app/apps/backend/node_modules
    networks:
      - tma-liar-network-test

volumes:
  mongodb_data_test:
    driver: local
  mongodb_config_test:
    driver: local
  backend_node_modules_test:
    driver: local

networks:
  tma-liar-network-test:
    driver: bridge
